<div [@routerTransition]>
    <section class="content-header">
        <div class="container-fluid">
            <div class="row">
                <div class="col-6">
                    <h1>{{ 'OilApprovals' | localize }}</h1>
                </div>
                <div class="col-6 text-right">
                    <a href="javascript: void(0)" class="btn bg-blue" (click)="createOrEditOilApproval()">
                        <i class="fa fa-plus-square"></i>
                        {{ 'CreateOilApproval' | localize }}
                    </a>
                </div>
            </div>
        </div>
    </section>

    <section class="content px-2 pb-3">
        <div class="container-fluid">
            <div class="card table-wrapper">
                <div class="card-body table-responsive table-striped table-bordered">
                    <div class="primeng-datatable-container" [busyIf]="primengTableHelper.isLoading">
                        <p-table #dataTable (onLazyLoad)="getOilApprovals($event)"
                                 [value]="primengTableHelper.records"
                                 [rows]="primengTableHelper.defaultRecordsCountPerPage" [paginator]="false"
                                 [lazy]="true" [scrollable]="true"
                                 [responsive]="primengTableHelper.isResponsive"
                                 [resizableColumns]="primengTableHelper.resizableColumns">
                            <ng-template pTemplate="header">
                                <tr>
                                    <th style="min-width: 150px" pSortableColumn="name">
                                        {{ 'Name' | localize }}
                                        <p-sortIcon field="name"></p-sortIcon>
                                    </th>
                                    <th style="min-width: 200px" pSortableColumn="description">
                                        {{ 'Description' | localize }}
                                        <p-sortIcon field="description"></p-sortIcon>
                                    </th>
                                    <th style="min-width: 130px" pSortableColumn="standardType">
                                        {{ 'StandardType' | localize }}
                                        <p-sortIcon field="standardType"></p-sortIcon>
                                    </th>
                                    <th style="min-width: 130px">
                                        {{ 'Actions' | localize }}
                                    </th>
                                </tr>
                            </ng-template>

                            <ng-template pTemplate="body" let-record="$implicit">
                                <tr>
                                    <td>
                                        <span>{{ record.name }}</span>
                                    </td>
                                    <td>
                                        <span>{{ record.description }}</span>
                                    </td>
                                    <td>
                                        <span>{{ record.standardType }}</span>
                                    </td>
                                    <td>
                                        <button
                                            type="button"
                                            class="btn btn-sm bg-secondary"
                                            (click)="createOrEditOilApproval(record)">
                                            <i class="fas fa-pencil-alt"></i>
                                            {{ 'Edit' | localize }}
                                        </button>
                                        <button
                                            type="button"
                                            class="btn btn-sm bg-danger mx-2"
                                            (click)="deleteOilApproval(record)">
                                            <i class="fas fa-trash"></i>
                                            {{ 'Delete' | localize }}
                                        </button>
                                    </td>
                                </tr>
                            </ng-template>
                        </p-table>

                        <div class="primeng-no-data" *ngIf="primengTableHelper.totalRecordsCount == 0">
                            {{ 'NoData' | localize }}
                        </div>
                        <div class="ui-table-footer"></div>
                    </div>

                    <div class="card-footer table-card-footer bg-white border-top">
                        <div class="row">
                            <div class="col-sm-4 col-12 text-sm-left text-center">
                                <button class="btn btn-secondary" (click)="getOilApprovals()">
                                    <i class="fas fa-redo-alt"></i>
                                </button>
                            </div>
                            <div class="col-sm-8 col-12">
                                <div class="float-sm-right m-auto">
                                    <div class="primeng-paging-container">
                                        <p-paginator
                                            [rows]="primengTableHelper.defaultRecordsCountPerPage"
                                            #paginator
                                            (onPageChange)="getOilApprovals($event)"
                                            [totalRecords]="primengTableHelper.totalRecordsCount"
                                            [rowsPerPageOptions]="primengTableHelper.predefinedRecordsCountPerPage"
                                            [showCurrentPageReport]="true"
                                            [currentPageReportTemplate]="
                                            'TotalRecordsCount' | localize: primengTableHelper.totalRecordsCount
                                        "></p-paginator>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
</div>
