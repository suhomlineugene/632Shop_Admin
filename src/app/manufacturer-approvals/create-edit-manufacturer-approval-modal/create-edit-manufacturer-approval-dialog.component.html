<form class="form-horizontal" autocomplete="off" #createEditManufacturerApprovalModal="ngForm" (ngSubmit)="save()">
    <abp-modal-header
        [title]="(id ? 'EditManufacturerApproval' : 'CreateNewManufacturerApproval') | localize"
        (onCloseClick)="bsModalRef.hide()">
    </abp-modal-header>

    <div class="modal-body">

        <div class="form-group row required">
            <label class="col-md-3 col-form-label" for="approvalName">
                {{ 'Name' | localize }}
            </label>
            <div class="col-md-9">
                <input
                    type="text"
                    class="form-control"
                    name="approvalName"
                    id="approvalName"
                    required
                    maxlength="256"
                    [(ngModel)]="approval.name"
                    #approvalName="ngModel"
                    #approvalNameEl />
                <abp-validation-summary
                    [control]="approvalName"
                    [controlEl]="approvalNameEl">
                </abp-validation-summary>
            </div>
        </div>

        <div class="form-group row">
            <label class="col-md-3 col-form-label" for="approvalDescription">
                {{ 'Description' | localize }}
            </label>
            <div class="col-md-9">
                <textarea
                    class="form-control"
                    name="approvalDescription"
                    id="approvalDescription"
                    [(ngModel)]="approval.description"
                    #approvalDescription="ngModel"
                    #approvalDescriptionEl
                    rows="3">
                </textarea>
                <abp-validation-summary
                    [control]="approvalDescription"
                    [controlEl]="approvalDescriptionEl">
                </abp-validation-summary>
            </div>
        </div>

        <div class="form-group row required">
            <label class="col-md-3 col-form-label" for="manufacturerName">
                {{ 'ManufacturerName' | localize }}
            </label>
            <div class="col-md-9">
                <input
                    type="text"
                    class="form-control"
                    name="manufacturerName"
                    id="manufacturerName"
                    required
                    maxlength="256"
                    [(ngModel)]="approval.manufacturerName"
                    #manufacturerName="ngModel"
                    #manufacturerNameEl />
                <abp-validation-summary
                    [control]="manufacturerName"
                    [controlEl]="manufacturerNameEl">
                </abp-validation-summary>
            </div>
        </div>

    </div>

    <abp-modal-footer
        [cancelDisabled]="saving"
        [saveDisabled]="!createEditManufacturerApprovalModal.form.valid || saving"
        (onCancelClick)="bsModalRef.hide()">
    </abp-modal-footer>
</form>
