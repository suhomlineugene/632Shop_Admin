<form class="form-horizontal" autocomplete="off" #createEditProductModal="ngForm" (ngSubmit)="save()">
    <abp-modal-header [title]="'CreateNewProduct' | localize" (onCloseClick)="bsModalRef.hide()"></abp-modal-header>
    <div class="modal-body">
        <div class="form-group row required">
            <label class="col-md-3 col-form-label" for="productType">
                {{ 'ProductType' | localize }}
            </label>
            <div class="col-md-9">
                <p-dropdown
                    inputId="productType"
                    name="productType"
                    [options]="productTypes"
                    optionLabel="name"
                    optionValue="id"
                    [(ngModel)]="product.productType"
                    [required]="true"
                    [style]="{'width': '100%'}"
                    placeholder="{{ 'SelectProductType' | localize }}"
                    #productType="ngModel"
                    #productTypeEl>
                </p-dropdown>
                <abp-validation-summary
                    [control]="productType"
                    [controlEl]="productTypeEl"></abp-validation-summary>
            </div>
        </div>

        <div class="form-group row required">
            <label class="col-md-3 col-form-label" for="name">
                {{ 'ProductName' | localize }}
            </label>
            <div class="col-md-9">
                <input
                    type="text"
                    class="form-control"
                    name="name"
                    id="name"
                    required
                    maxlength="256"
                    [(ngModel)]="product.name"
                    #name="ngModel"
                    #nameEl />
                <abp-validation-summary
                    [control]="name"
                    [controlEl]="nameEl"></abp-validation-summary>
            </div>
        </div>

        <div class="form-group row required">
            <label class="col-md-3 col-form-label" for="containerSize">
                {{ 'Capacity' | localize }}
            </label>
            <div class="col-md-9">
                <input
                    type="text"
                    class="form-control"
                    name="capacity"
                    id="capacity"
                    required
                    [(ngModel)]="product.capacity"
                    #capacity="ngModel"
                    #capacityEl />
                <abp-validation-summary
                    [control]="capacity"
                    [controlEl]="capacityEl"></abp-validation-summary>
            </div>
        </div>

        <div class="form-group row required">
            <label class="col-md-3 col-form-label" for="price">
                {{ 'Price' | localize }}
            </label>
            <div class="col-md-9">
                <input
                    type="number"
                    class="form-control"
                    name="price"
                    id="price"
                    required
                    step="0.01"
                    [(ngModel)]="product.price"
                    #price="ngModel"
                    #priceEl />
                <abp-validation-summary
                    [control]="price"
                    [controlEl]="priceEl"></abp-validation-summary>
            </div>
        </div>

        <div class="form-group row">
            <label class="col-md-3 col-form-label" for="description">
                {{ 'Description' | localize }}
            </label>
            <div class="col-md-9">
                <textarea
                    class="form-control"
                    name="description"
                    id="description"
                    [(ngModel)]="product.description"
                    #description="ngModel"
                    #descriptionEl
                    rows="3"></textarea>
                <abp-validation-summary
                    [control]="description"
                    [controlEl]="descriptionEl"></abp-validation-summary>
            </div>
        </div>

        <div class="form-group row required">
            <label class="col-md-3 col-form-label" for="containerSize">
                {{ 'CountryOfOrigin' | localize }}
            </label>
            <div class="col-md-9">
                <input
                    type="text"
                    class="form-control"
                    name="countryOfOrigin"
                    id="countryOfOrigin"
                    required
                    [(ngModel)]="product.countryOfOrigin"
                    #countryOfOrigin="ngModel"
                    #countryOfOriginEl />
                <abp-validation-summary
                    [control]="countryOfOrigin"
                    [controlEl]="countryOfOriginEl"></abp-validation-summary>
            </div>
        </div>

        <!-- Viscosity: Motor Oil only -->
        <div class="form-group row" *ngIf="product.productType == ProductType.MotorOil">
            <label class="col-md-3 col-form-label" for="viscosity">
                {{ 'Viscosity' | localize }}
            </label>
            <div class="col-md-9">
                <input
                    type="text"
                    class="form-control"
                    name="viscosity"
                    id="viscosity"
                    [(ngModel)]="product.viscosity"
                    #viscosity="ngModel"
                    #viscosityEl />
                <abp-validation-summary
                    [control]="viscosity"
                    [controlEl]="viscosityEl"></abp-validation-summary>
            </div>
        </div>

        <!-- CoolantApproval: Coolant only -->
        <div class="form-group row" *ngIf="product.productType == ProductType.Coolant">
            <label class="col-md-3 col-form-label" for="coolantApproval">
                {{ 'CoolantApproval' | localize }}
            </label>
            <div class="col-md-9">
                <input
                    type="text"
                    class="form-control"
                    name="coolantApproval"
                    id="coolantApproval"
                    [(ngModel)]="product.coolantApproval"
                    #coolantApproval="ngModel"
                    #coolantApprovalEl />
                <abp-validation-summary
                    [control]="coolantApproval"
                    [controlEl]="coolantApprovalEl"></abp-validation-summary>
            </div>
        </div>

        <!-- TransmissionViscosity: Transmission Fluid only -->
        <div class="form-group row" *ngIf="product.productType == ProductType.TransmissionFluid">
            <label class="col-md-3 col-form-label" for="transmissionViscosity">
                {{ 'TransmissionViscosity' | localize }}
            </label>
            <div class="col-md-9">
                <input
                    type="text"
                    class="form-control"
                    name="transmissionViscosity"
                    id="transmissionViscosity"
                    [(ngModel)]="product.transmissionViscosity"
                    #transmissionViscosity="ngModel"
                    #transmissionViscosityEl />
                <abp-validation-summary
                    [control]="transmissionViscosity"
                    [controlEl]="transmissionViscosityEl"></abp-validation-summary>
            </div>
        </div>

        <!-- AdditiveType: Additive only -->
        <div class="form-group row" *ngIf="product.productType == ProductType.Additive">
            <label class="col-md-3 col-form-label" for="additiveType">
                {{ 'AdditiveType' | localize }}
            </label>
            <div class="col-md-9">
                <input
                    type="text"
                    class="form-control"
                    name="additiveType"
                    id="additiveType"
                    [(ngModel)]="product.additiveType"
                    #additiveType="ngModel"
                    #additiveTypeEl />
                <abp-validation-summary
                    [control]="additiveType"
                    [controlEl]="additiveTypeEl"></abp-validation-summary>
            </div>
        </div>

        <div class="form-group row">
            <label class="col-md-3 col-form-label">
                {{ 'IsAvailable' | localize }}
            </label>
            <div class="col-md-9">
                <div class="checkbox">
                    <label>
                        <input
                            type="checkbox"
                            name="isPublished"
                            [(ngModel)]="product.isAvailable" />
                    </label>
                </div>
            </div>
        </div>
    </div>
    <abp-modal-footer
        [cancelDisabled]="saving"
        [saveDisabled]="!createEditProductModal.form.valid || saving"
        (onCancelClick)="bsModalRef.hide()"></abp-modal-footer>
</form>
